services:
  pi-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/pi-coding-agent:latest
    container_name: pi_coding_agent
    
    tty: true
    stdin_open: true

    environment:
      # Ensure HOME resolves correctly when running as an arbitrary host UID
      # (without this, ~/.pi expands to /.pi and crashes with EACCES).
      - HOME=/home/node
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GIT_AUTHOR_NAME=${GIT_NAME}
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_NAME=${GIT_NAME}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}

      # Git credential helper — use gh CLI which reads GITHUB_TOKEN
      - GIT_CONFIG_COUNT=3
      - GIT_CONFIG_KEY_0=credential.https://github.com.helper
      - GIT_CONFIG_VALUE_0=!/usr/bin/gh auth git-credential
      # GPG config
      - GIT_CONFIG_KEY_1=user.signingkey
      - GIT_CONFIG_VALUE_1=${GIT_GPG_KEY}
      - GIT_CONFIG_KEY_2=commit.gpgsign
      - GIT_CONFIG_VALUE_2=${GIT_GPG_SIGN:-false}

    volumes:
      - .:/workspace
      - pi_data:/home/node/.pi
      - ${SKILLS_DIR:-~/.agents/skills}:/home/node/.agents/skills:ro
      
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    
    networks:
      - pi_network

    restart: "no"

volumes:
  pi_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.pi-data

networks:
  pi_network:
    driver: bridge